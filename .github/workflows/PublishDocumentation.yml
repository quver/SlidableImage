name: PublishDocumentation

on: 
  release:
    types: [published]

jobs:
  deploy_docs:
    runs-on: macOS-latest
    steps:
    - uses: actions/checkout@v6
    - name: Publish Jazzy Docs
      uses: steven0351/publish-jazzy-docs@v1.1.2
      with:
        personal_access_token: ${{ secrets.ACCESS_TOKEN }}